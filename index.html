<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>每周订货预测系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['-apple-system', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'] }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
  <style>
    input[type="number"] { font-size: 16px; }
    .day-cell { min-width: 0; }
    @keyframes fadeInOut {
      0%   { opacity: 0; transform: translateY(10px); }
      15%  { opacity: 1; transform: translateY(0); }
      85%  { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-10px); }
    }
    .toast-anim { animation: fadeInOut 2s ease both; }
    /* 日历周高亮行 */
    .week-row-selected td { background: #eff6ff; }
    .week-row-selected td:first-child { border-radius: 8px 0 0 8px; }
    .week-row-selected td:last-child  { border-radius: 0 8px 8px 0; }
    /* 日历过渡 */
    .cal-slide { transition: all 0.2s ease; }
  </style>
</head>

<body class="bg-gray-50 font-sans min-h-screen pb-8" x-data="orderApp()" x-init="init()">

<!-- ════════════════════ 顶栏 ════════════════════ -->
<header class="sticky top-0 z-30 bg-white border-b border-gray-200 shadow-sm">
  <div class="px-4 py-3 flex items-center justify-between">
    <h1 class="text-lg font-bold text-gray-800">每周订货预测系统</h1>
    <button @click="showCal = !showCal"
      class="flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-lg transition-colors"
      :class="showCal ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-600'">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      选择周期
    </button>
  </div>
  <!-- 已选周期条 -->
  <div class="px-4 pb-2 flex items-center gap-2" @click="showCal = true">
    <span class="text-xs text-gray-400">订货周期</span>
    <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full"
      x-text="selectedPeriodLabel"></span>
  </div>
</header>

<!-- ════════════════════ 日历选择器 (可折叠) ════════════════════ -->
<div x-show="showCal" x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
  x-transition:leave="transition ease-in duration-150"
  x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0 -translate-y-2"
  class="mx-4 mt-3 bg-white rounded-xl border border-gray-200 shadow-md overflow-hidden">

  <!-- 月份导航 -->
  <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
    <button @click="calPrevMonth()" class="p-1 rounded-lg hover:bg-gray-100 active:bg-gray-200 transition-colors">
      <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <span class="text-sm font-bold text-gray-800"
      x-text="calYear + '年' + (calMonth + 1) + '月'"></span>
    <button @click="calNextMonth()" class="p-1 rounded-lg hover:bg-gray-100 active:bg-gray-200 transition-colors">
      <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

  <!-- 提示 -->
  <div class="px-4 pt-2 pb-1">
    <p class="text-[11px] text-gray-400">点击任意日期，自动选中该日所在的整周（周二~周一）</p>
  </div>

  <!-- 星期表头 -->
  <div class="grid grid-cols-7 px-3 pt-1">
    <template x-for="h in ['二','三','四','五','六','日','一']" :key="h">
      <div class="text-center text-[11px] font-medium text-gray-400 py-1" x-text="h"></div>
    </template>
  </div>

  <!-- 日期网格 -->
  <div class="px-3 pb-3">
    <template x-for="(week, wi) in calWeeks" :key="wi">
      <div class="grid grid-cols-7" :class="isWeekSelected(week) ? 'rounded-lg bg-blue-50' : ''">
        <template x-for="(cell, ci) in week" :key="wi + '-' + ci">
          <button @click="cell.date && selectWeekByDate(cell.date)"
            class="py-2 text-center text-sm rounded-lg transition-all relative"
            :class="{
              'text-gray-300 pointer-events-none': !cell.inMonth,
              'text-gray-700': cell.inMonth && !cell.isSelected,
              'text-blue-700 font-bold': cell.isSelected,
              'ring-2 ring-blue-400 bg-blue-100': cell.isToday && cell.isSelected,
              'ring-1 ring-gray-300': cell.isToday && !cell.isSelected,
              'hover:bg-gray-100': cell.inMonth && !cell.isSelected,
            }">
            <span x-text="cell.day"></span>
            <!-- 周起始标记 -->
            <span x-show="cell.isWeekStart && cell.isSelected"
              class="absolute -top-0.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-blue-500"></span>
          </button>
        </template>
      </div>
    </template>
  </div>

  <!-- 选中确认 -->
  <div class="px-4 py-3 border-t border-gray-100 bg-gray-50 flex items-center justify-between">
    <div class="text-xs text-gray-500">
      已选：<span class="font-semibold text-blue-600" x-text="selectedPeriodLabel"></span>
    </div>
    <button @click="showCal = false"
      class="px-4 py-1.5 text-xs font-semibold bg-blue-600 text-white rounded-lg active:bg-blue-700 transition-colors">
      确定
    </button>
  </div>
</div>

<!-- ════════════════════ 系数设置 ════════════════════ -->
<section class="mx-4 mt-4 p-4 bg-white rounded-xl border border-gray-200 shadow-sm">
  <h2 class="text-sm font-semibold text-gray-700 mb-3">系数设置</h2>
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="text-xs text-gray-500 block mb-1">节假日系数</label>
      <input type="number" step="0.1" min="1" max="5"
        x-model.number="holidayCoeff" @change="saveSettings()"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-center font-semibold text-amber-600 focus:ring-2 focus:ring-amber-300 focus:outline-none">
    </div>
    <div>
      <label class="text-xs text-gray-500 block mb-1">促销系数</label>
      <input type="number" step="0.1" min="1" max="10"
        x-model.number="promoCoeff" @change="saveSettings()"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-center font-semibold text-pink-600 focus:ring-2 focus:ring-pink-300 focus:outline-none">
    </div>
  </div>
</section>

<!-- ════════════════════ 订货周内特殊日期勾选 ════════════════════ -->
<section class="mx-4 mt-4 p-4 bg-white rounded-xl border border-gray-200 shadow-sm">
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-sm font-semibold text-gray-700">特殊日期标记</h2>
    <span class="text-xs px-2 py-1 rounded-full bg-blue-50 text-blue-600 font-medium"
      x-text="selectedPeriodLabel"></span>
  </div>

  <!-- 7天勾选网格 -->
  <div class="grid grid-cols-7 gap-1 text-center">
    <template x-for="day in nextWeekDays" :key="day.date">
      <div class="day-cell">
        <p class="text-xs font-medium text-gray-500" x-text="'周' + day.label"></p>
        <p class="text-xs text-gray-400 mb-1.5" x-text="day.short"></p>
        <label class="flex flex-col items-center cursor-pointer mb-1">
          <input type="checkbox" x-model="day.isHoliday"
            class="w-4 h-4 rounded border-gray-300 text-amber-500 focus:ring-amber-400 accent-amber-500">
          <span class="text-[10px] mt-0.5"
            :class="day.isHoliday ? 'text-amber-600 font-medium' : 'text-gray-400'">节</span>
        </label>
        <label class="flex flex-col items-center cursor-pointer">
          <input type="checkbox" x-model="day.isPromo"
            class="w-4 h-4 rounded border-gray-300 text-pink-500 focus:ring-pink-400 accent-pink-500">
          <span class="text-[10px] mt-0.5"
            :class="day.isPromo ? 'text-pink-600 font-medium' : 'text-gray-400'">促</span>
        </label>
      </div>
    </template>
  </div>

  <div class="mt-3 pt-3 border-t border-gray-100 flex items-center justify-between">
    <div class="flex gap-3 text-xs text-gray-400">
      <span>节假日 <span class="font-medium text-amber-600" x-text="holidayCount + '天'"></span></span>
      <span>促销 <span class="font-medium text-pink-600" x-text="promoCount + '天'"></span></span>
    </div>
    <div class="text-sm font-bold" :class="getMultiplier() > 1 ? 'text-blue-600' : 'text-gray-500'">
      综合倍数 × <span x-text="getMultiplier().toFixed(3)"></span>
    </div>
  </div>
</section>

<!-- ════════════════════ 商品卡片 ════════════════════ -->
<template x-for="(p, pi) in products" :key="p.name">
  <section class="mx-4 mt-4 bg-white rounded-xl border shadow-sm overflow-hidden"
    :class="{
      'border-blue-200':   pi === 0,
      'border-green-200':  pi === 1,
      'border-purple-200': pi === 2,
    }">
    <div class="px-4 py-2.5 flex items-center justify-between"
      :class="{
        'bg-blue-50':   pi === 0,
        'bg-green-50':  pi === 1,
        'bg-purple-50': pi === 2,
      }">
      <span class="font-bold"
        :class="{
          'text-blue-700':   pi === 0,
          'text-green-700':  pi === 1,
          'text-purple-700': pi === 2,
        }" x-text="p.name"></span>
      <span class="text-xs px-2 py-0.5 rounded-full font-medium"
        :class="{
          'bg-blue-100 text-blue-600':     pi === 0,
          'bg-green-100 text-green-600':   pi === 1,
          'bg-purple-100 text-purple-600': pi === 2,
        }" x-text="'¥' + p.price"></span>
    </div>

    <div class="p-4 space-y-3">
      <!-- 退货（置顶） -->
      <div class="flex items-center gap-3 p-2.5 rounded-lg bg-red-50 border border-red-100">
        <label class="text-xs font-medium text-red-500 whitespace-nowrap">本周退货</label>
        <input type="number" min="0" x-model.number="p.returns"
          @blur="if(isNaN(p.returns) || p.returns < 0) p.returns = 0"
          placeholder="0"
          class="flex-1 border border-red-200 rounded-lg px-3 py-2 font-semibold text-center text-red-600 bg-white focus:ring-2 focus:ring-red-300 focus:outline-none">
        <span class="text-xs text-red-400 whitespace-nowrap" x-show="p.returns > 0"
          x-text="'库存 ' + (p.currentStock||0) + '-' + p.returns + '=' + getAdjustedStock(p)"></span>
      </div>

      <!-- 输入行 -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-500 block mb-1">当前库存</label>
          <input type="number" min="0" x-model.number="p.currentStock"
            @blur="if(isNaN(p.currentStock) || p.currentStock < 0) p.currentStock = 0"
            placeholder="0"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 font-semibold text-center focus:ring-2 focus:outline-none"
            :class="{
              'focus:ring-blue-300 focus:border-blue-400':     pi === 0,
              'focus:ring-green-300 focus:border-green-400':   pi === 1,
              'focus:ring-purple-300 focus:border-purple-400': pi === 2,
            }">
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">上周订货量</label>
          <input type="number" min="0" x-model.number="p.lastOrder"
            @blur="if(isNaN(p.lastOrder) || p.lastOrder < 0) p.lastOrder = 0"
            placeholder="0"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 font-semibold text-center focus:ring-2 focus:outline-none"
            :class="{
              'focus:ring-blue-300 focus:border-blue-400':     pi === 0,
              'focus:ring-green-300 focus:border-green-400':   pi === 1,
              'focus:ring-purple-300 focus:border-purple-400': pi === 2,
            }">
        </div>
      </div>

      <!-- 调整后库存提示 -->
      <div x-show="p.returns > 0"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-amber-50 text-xs text-amber-700">
        <svg class="w-3.5 h-3.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        <span>退货扣减后，实际库存为 <span class="font-bold" x-text="getAdjustedStock(p)"></span></span>
      </div>

      <!-- 计算结果 -->
      <div class="space-y-1.5 pt-1">
        <div class="flex justify-between items-center text-sm py-1.5 px-3 rounded-lg bg-gray-50">
          <span class="text-gray-500">上周实际销量</span>
          <span class="font-semibold text-gray-700" x-text="getActualSales(p)"></span>
        </div>
        <div class="flex justify-between items-center text-sm py-1.5 px-3 rounded-lg bg-gray-50">
          <span class="text-gray-500">预估下周销量</span>
          <span class="font-semibold text-gray-700" x-text="getForecastSales(p)"></span>
        </div>
      </div>

      <!-- 建议订货量高亮 -->
      <div class="flex justify-between items-center py-3 px-4 rounded-xl text-white"
        :class="{
          'bg-blue-600':   pi === 0,
          'bg-green-600':  pi === 1,
          'bg-purple-600': pi === 2,
        }">
        <span class="text-sm font-medium text-white/90">建议订货量</span>
        <span class="text-2xl font-bold" x-text="getSuggestedOrder(p)"></span>
      </div>
    </div>
  </section>
</template>

<!-- ════════════════════ 操作按钮 ════════════════════ -->
<div class="mx-4 mt-5 grid grid-cols-2 gap-3">
  <button @click="saveRecord()"
    class="flex items-center justify-center gap-2 py-3 rounded-xl font-semibold text-sm bg-blue-600 text-white active:bg-blue-700 transition-colors shadow-sm">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
    </svg>
    保存本周记录
  </button>
  <button @click="copyToClipboard()"
    class="flex items-center justify-center gap-2 py-3 rounded-xl font-semibold text-sm bg-gray-700 text-white active:bg-gray-800 transition-colors shadow-sm">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
    </svg>
    复制数据
  </button>
</div>

<!-- Toast -->
<div x-show="toastMsg" x-transition
  class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-full text-sm font-medium shadow-lg toast-anim"
  :class="toastType === 'success' ? 'bg-green-600 text-white' : 'bg-red-500 text-white'"
  x-text="toastMsg">
</div>

<!-- ════════════════════ 历史记录 ════════════════════ -->
<section class="mx-4 mt-6 bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
  <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
    <h2 class="text-sm font-semibold text-gray-700">
      历史记录
      <span class="text-xs text-gray-400 font-normal ml-1" x-text="'(' + history.length + '条)'"></span>
    </h2>
    <button x-show="history.length > 0" @click="if(confirm('确定清空全部历史记录？')) clearHistory()"
      class="text-xs text-red-400 hover:text-red-600 transition-colors">清空</button>
  </div>

  <div x-show="history.length === 0" class="py-8 text-center text-sm text-gray-400">暂无历史记录</div>

  <div x-show="history.length > 0" class="overflow-x-auto">
    <template x-for="(record, ri) in history.slice().reverse()" :key="record.date + ri">
      <div class="border-b border-gray-50 last:border-0">
        <div class="px-4 py-2 bg-gray-50 flex items-center justify-between">
          <span class="text-xs font-medium text-gray-600" x-text="record.period || record.date"></span>
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-400" x-text="'倍数 ×' + (record.multiplier || 1).toFixed(2)"></span>
            <button @click="deleteRecord(history.length - 1 - ri)"
              class="text-xs text-red-300 hover:text-red-500 transition-colors ml-1">删除</button>
          </div>
        </div>
        <template x-for="e in record.entries" :key="e.product">
          <div class="px-4 py-1.5 flex items-center text-xs gap-2 border-t border-gray-50">
            <span class="w-16 font-medium text-gray-600 flex-shrink-0" x-text="e.product"></span>
            <div class="flex-1 flex items-center gap-2 text-gray-500 overflow-x-auto whitespace-nowrap">
              <span x-show="e.returns > 0">退:<span class="text-red-500 font-medium" x-text="e.returns"></span></span>
              <span>库存:<span class="font-medium text-gray-700" x-text="e.returns > 0 ? (e.adjustedStock ?? e.stock) : e.stock"></span>
                <span x-show="e.returns > 0" class="text-gray-400" x-text="'(' + e.stock + '-' + e.returns + ')'"></span>
              </span>
              <span>销量:<span class="font-medium text-gray-700" x-text="e.sales"></span></span>
              <span>订货:<span class="font-bold" :class="e.order > 0 ? 'text-blue-600' : 'text-gray-400'" x-text="e.order"></span></span>
            </div>
          </div>
        </template>
      </div>
    </template>
  </div>
</section>

<div class="h-8"></div>

<!-- ════════════════════ ALPINE APP ════════════════════ -->
<script>
const DAY_LABELS = ['日', '一', '二', '三', '四', '五', '六'];

function formatDateShort(d) {
  return (d.getMonth() + 1) + '/' + d.getDate();
}
function formatDateWithDay(d) {
  return formatDateShort(d) + '(' + DAY_LABELS[d.getDay()] + ')';
}
function dateToStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}
function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

// 获取某日期所在周期的起始周二（周二~下周一）
function getPeriodTuesday(dt) {
  const d = new Date(dt);
  const dow = d.getDay();
  let diff = (dow >= 2) ? (dow - 2) : (dow + 5);
  d.setDate(d.getDate() - diff);
  d.setHours(0,0,0,0);
  return d;
}

function orderApp() {
  return {
    // 系数
    holidayCoeff: 1.5,
    promoCoeff: 2.0,

    // 日历状态
    showCal: false,
    calYear: 2026,
    calMonth: 3, // 0-indexed, 3=April
    calWeeks: [],

    // 选中的周期 (起始周二)
    selectedTueDate: null,   // Date object
    selectedPeriodLabel: '',
    nextWeekDays: [],

    // 商品
    products: [
      { name: '30元商品',  price: 30,  currentStock: 0, lastOrder: 0, returns: 0 },
      { name: '50元商品',  price: 50,  currentStock: 0, lastOrder: 0, returns: 0 },
      { name: '100元商品', price: 100, currentStock: 0, lastOrder: 0, returns: 0 },
    ],

    // 历史
    history: [],

    // Toast
    toastMsg: '',
    toastType: 'success',

    // ── 初始化 ──
    init() {
      const today = new Date();
      // 默认选中：下一个周二开始的周期（即从今天往后找最近的下一个周二）
      const curTue = getPeriodTuesday(today);
      const nextTue = new Date(curTue);
      nextTue.setDate(nextTue.getDate() + 7);
      this.selectWeek(nextTue);

      this.calYear = nextTue.getFullYear();
      this.calMonth = nextTue.getMonth();
      this.buildCalendar();

      this.loadSettings();
      this.loadHistory();
    },

    // ── 日历 ──

    buildCalendar() {
      const year = this.calYear;
      const month = this.calMonth;

      // 本月第1天
      const firstDay = new Date(year, month, 1);
      // 本月最后一天
      const lastDay = new Date(year, month + 1, 0);

      // 日历从周二开始：找到第1天前最近的周二
      const startDate = new Date(firstDay);
      const dow = startDate.getDay();
      // 需要回退到周二：dow=0(Sun)->-5, 1(Mon)->-6, 2(Tue)->0, 3->-1, 4->-2, 5->-3, 6->-4
      let backDays = (dow >= 2) ? (dow - 2) : (dow + 5);
      startDate.setDate(startDate.getDate() - backDays);

      const today = new Date();
      today.setHours(0,0,0,0);

      const weeks = [];
      let cursor = new Date(startDate);

      // 生成6周确保覆盖整月
      for (let w = 0; w < 6; w++) {
        const week = [];
        for (let d = 0; d < 7; d++) {
          const cellDate = new Date(cursor);
          const inMonth = cellDate.getMonth() === month;
          const isToday = sameDay(cellDate, today);
          const isSelected = this.selectedTueDate && this.isDateInSelectedWeek(cellDate);
          const isWeekStart = cellDate.getDay() === 2; // Tuesday
          week.push({
            date: new Date(cellDate),
            day: cellDate.getDate(),
            inMonth,
            isToday,
            isSelected,
            isWeekStart,
          });
          cursor.setDate(cursor.getDate() + 1);
        }
        // 只显示含本月日期的行
        if (week.some(c => c.inMonth)) {
          weeks.push(week);
        }
      }
      this.calWeeks = weeks;
    },

    isDateInSelectedWeek(dt) {
      if (!this.selectedTueDate) return false;
      const tue = this.selectedTueDate.getTime();
      const mon = tue + 6 * 86400000;
      const t = dt.getTime();
      return t >= tue && t <= mon;
    },

    isWeekSelected(week) {
      return week.some(c => c.isSelected);
    },

    selectWeekByDate(dt) {
      const tue = getPeriodTuesday(dt);
      this.selectWeek(tue);
      this.buildCalendar(); // 刷新高亮
    },

    selectWeek(tue) {
      this.selectedTueDate = new Date(tue);
      const mon = new Date(tue);
      mon.setDate(mon.getDate() + 6);
      this.selectedPeriodLabel = formatDateWithDay(tue) + ' ~ ' + formatDateWithDay(mon);

      // 生成 7 天特殊日期勾选
      this.nextWeekDays = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(tue);
        d.setDate(d.getDate() + i);
        this.nextWeekDays.push({
          date: dateToStr(d),
          label: DAY_LABELS[d.getDay()],
          short: formatDateShort(d),
          isHoliday: false,
          isPromo: false,
        });
      }
    },

    calPrevMonth() {
      if (this.calMonth === 0) {
        this.calMonth = 11;
        this.calYear--;
      } else {
        this.calMonth--;
      }
      this.buildCalendar();
    },

    calNextMonth() {
      if (this.calMonth === 11) {
        this.calMonth = 0;
        this.calYear++;
      } else {
        this.calMonth++;
      }
      this.buildCalendar();
    },

    // ── 计算 ──

    get holidayCount() {
      return this.nextWeekDays.filter(d => d.isHoliday).length;
    },
    get promoCount() {
      return this.nextWeekDays.filter(d => d.isPromo).length;
    },

    getMultiplier() {
      if (this.nextWeekDays.length === 0) return 1;
      let sum = 0;
      for (const day of this.nextWeekDays) {
        let m = 1.0;
        if (day.isHoliday) m *= this.holidayCoeff;
        if (day.isPromo)   m *= this.promoCoeff;
        sum += m;
      }
      return sum / 7;
    },

    getAdjustedStock(p) {
      return Math.max(0, (p.currentStock || 0) - (p.returns || 0));
    },

    getActualSales(p) {
      const adjustedStock = this.getAdjustedStock(p);
      return Math.max(0, (p.lastOrder || 0) - adjustedStock);
    },

    getForecastSales(p) {
      return Math.round(this.getActualSales(p) * this.getMultiplier());
    },

    getSuggestedOrder(p) {
      const adjustedStock = this.getAdjustedStock(p);
      return Math.max(0, this.getForecastSales(p) - adjustedStock);
    },

    // ── 保存/加载 ──

    saveSettings() {
      localStorage.setItem('weekly_order_settings', JSON.stringify({
        holidayCoeff: this.holidayCoeff,
        promoCoeff: this.promoCoeff,
      }));
    },

    loadSettings() {
      try {
        const s = JSON.parse(localStorage.getItem('weekly_order_settings'));
        if (s) {
          if (s.holidayCoeff) this.holidayCoeff = s.holidayCoeff;
          if (s.promoCoeff)   this.promoCoeff = s.promoCoeff;
        }
      } catch(e) {}
    },

    loadHistory() {
      try {
        const raw = localStorage.getItem('weekly_order_history');
        if (raw) this.history = JSON.parse(raw);
      } catch(e) { this.history = []; }
    },

    saveHistory() {
      localStorage.setItem('weekly_order_history', JSON.stringify(this.history));
    },

    saveRecord() {
      const record = {
        date: new Date().toISOString().slice(0, 10),
        period: this.selectedPeriodLabel,
        multiplier: this.getMultiplier(),
        holidayDays: this.holidayCount,
        promoDays: this.promoCount,
        entries: this.products.map(p => ({
          product: p.name,
          stock: p.currentStock || 0,
          adjustedStock: this.getAdjustedStock(p),
          lastOrder: p.lastOrder || 0,
          sales: this.getActualSales(p),
          forecast: this.getForecastSales(p),
          order: this.getSuggestedOrder(p),
          returns: p.returns || 0,
        })),
      };
      this.history.push(record);
      this.saveHistory();
      this.showToast('记录已保存', 'success');
    },

    deleteRecord(index) {
      this.history.splice(index, 1);
      this.saveHistory();
      this.showToast('已删除', 'success');
    },

    clearHistory() {
      this.history = [];
      this.saveHistory();
      this.showToast('历史已清空', 'success');
    },

    // ── 复制 ──

    copyToClipboard() {
      const header = '日期\t商品\t退货\t当前库存\t调整后库存\t上周订货\t实际销量\t预估销量\t建议订货量';
      const rows = this.products.map(p =>
        [
          this.selectedPeriodLabel,
          p.name,
          p.returns || 0,
          p.currentStock || 0,
          this.getAdjustedStock(p),
          p.lastOrder || 0,
          this.getActualSales(p),
          this.getForecastSales(p),
          this.getSuggestedOrder(p),
        ].join('\t')
      );
      const text = header + '\n' + rows.join('\n');

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          this.showToast('已复制，可粘贴到腾讯文档', 'success');
        }).catch(() => this.fallbackCopy(text));
      } else {
        this.fallbackCopy(text);
      }
    },

    fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        this.showToast('已复制，可粘贴到腾讯文档', 'success');
      } catch(e) {
        this.showToast('复制失败，请手动复制', 'error');
      }
      document.body.removeChild(ta);
    },

    showToast(msg, type) {
      this.toastMsg = msg;
      this.toastType = type || 'success';
      setTimeout(() => { this.toastMsg = ''; }, 2000);
    },
  };
}
</script>
